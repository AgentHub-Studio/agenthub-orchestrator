---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agenthub-orchestrator
  namespace: agenthub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agenthub-orchestrator
  template:
    metadata:
      labels:
        app: agenthub-orchestrator
    spec:
      containers:
        - name: orchestrator
          image: localhost:5000/agenthub-orchestrator:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          env:
            - name: PORT
              value: "8084"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agenthub-secrets
                  key: database-url
            - name: KEYCLOAK_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: agenthub-config
                  key: keycloak-url
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: agenthub-secrets
                  key: rabbitmq-url
            - name: SKILL_RUNTIME_URL
              value: http://agenthub-skill-runtime.agenthub.svc.cluster.local:8083
            - name: EMBEDDING_URL
              value: http://agenthub-embedding.agenthub.svc.cluster.local:8000
            - name: AGENTHUB_API_URL
              value: http://agenthub-api.agenthub.svc.cluster.local:8081
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agenthub-secrets
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agenthub-secrets
                  key: anthropic-api-key
                  optional: true
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: agenthub-config
                  key: ollama-base-url
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agenthub-secrets
                  key: openrouter-api-key
                  optional: true
            - name: LOG_LEVEL
              value: info
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agenthub-orchestrator
  namespace: agenthub
spec:
  selector:
    app: agenthub-orchestrator
  ports:
    - port: 8084
      targetPort: 8084
