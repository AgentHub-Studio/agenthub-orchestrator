---
# agenthub-orchestrator — Go (replaces Java Spring MVC, porta 8082→8084)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agenthub-orchestrator
  namespace: agenthub
  labels:
    app: agenthub-orchestrator
    version: go
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agenthub-orchestrator
  template:
    metadata:
      labels:
        app: agenthub-orchestrator
        version: go
    spec:
      containers:
        - name: orchestrator
          image: localhost:5000/agenthub-orchestrator:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8084
              protocol: TCP
          envFrom:
            - configMapRef:
                name: agenthub-orchestrator-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: agenthub-secrets
                  key: DATABASE_URL
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: agenthub-secrets
                  key: RABBITMQ_URL
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agenthub-llm-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agenthub-llm-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: agenthub-llm-secrets
                  key: OPENROUTER_API_KEY
                  optional: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: agenthub-orchestrator
  namespace: agenthub
  labels:
    app: agenthub-orchestrator
spec:
  selector:
    app: agenthub-orchestrator
  ports:
    - name: http
      port: 8084
      targetPort: 8084
      protocol: TCP
