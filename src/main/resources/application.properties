# ===================================================================
# AgentHub Orchestrator - Application Configuration
# ===================================================================

# ===================================================================
# APPLICATION
# ===================================================================
spring.application.name=agenthub-orchestrator

# ===================================================================
# DATABASE
# ===================================================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agenthub}
spring.datasource.username=${DB_USER:agenthub}
spring.datasource.password=${DB_PASSWORD:agenthub_dev}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===================================================================
# JPA / HIBERNATE
# ===================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50

# ===================================================================
# RABBITMQ
# ===================================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:agenthub}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:agenthub_dev}

# Listener
spring.rabbitmq.listener.simple.concurrency=5
spring.rabbitmq.listener.simple.max-concurrency=10
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2.0

# ===================================================================
# JACKSON
# ===================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# ===================================================================
# SERVER
# ===================================================================
server.port=${SERVER_PORT:8082}
server.servlet.context-path=/orchestrator/api
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on_param
server.error.include-exception=false
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ===================================================================
# ACTUATOR / MANAGEMENT
# ===================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoints.web.base-path=/management
management.metrics.export.prometheus.enabled=true
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ===================================================================
# LOGGING (levels only - format controlled by logback-spring.xml)
# ===================================================================
logging.level.root=INFO
logging.level.com.agenthub=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===================================================================
# AGENTHUB CUSTOM PROPERTIES
# ===================================================================

# Execution
agenthub.orchestrator.execution.max-parallel-nodes=10
agenthub.orchestrator.execution.node-timeout-ms=300000
agenthub.orchestrator.execution.execution-timeout-ms=1800000
agenthub.orchestrator.execution.in-memory-cache-enabled=${AGENTHUB_EXECUTION_IN_MEMORY_CACHE_ENABLED:true}

# Scheduler
agenthub.orchestrator.scheduler.poll-interval-ms=1000
agenthub.orchestrator.scheduler.max-retry-attempts=3
agenthub.orchestrator.scheduler.retry-delay-ms=5000

# Threading
agenthub.orchestrator.threading.core-pool-size=5
agenthub.orchestrator.threading.max-pool-size=20
agenthub.orchestrator.threading.queue-capacity=100

# Event publishing
agenthub.orchestrator.events.rabbitmq-enabled=${AGENTHUB_EVENTS_RABBITMQ_ENABLED:false}
agenthub.orchestrator.events.exchange=${AGENTHUB_EVENTS_EXCHANGE:agenthub.orchestrator.events}

# Backend integration (cadastros source of truth)
agenthub.backend.base-url=${AGENTHUB_BACKEND_BASE_URL:http://agenthub-backend:8080}
agenthub.backend.service-token=${AGENTHUB_BACKEND_SERVICE_TOKEN:}
agenthub.backend.request-timeout-ms=${AGENTHUB_BACKEND_REQUEST_TIMEOUT_MS:3000}
agenthub.backend.max-retries=${AGENTHUB_BACKEND_MAX_RETRIES:2}
agenthub.backend.retry-backoff-ms=${AGENTHUB_BACKEND_RETRY_BACKOFF_MS:250}

# ===================================================================
# SPRINGDOC / OPENAPI
# ===================================================================
springdoc.api-docs.path=/v1/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.show-actuator=false
