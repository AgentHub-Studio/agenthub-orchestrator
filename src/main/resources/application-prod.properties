# ===================================================================
# AgentHub Orchestrator - Production Profile
# ===================================================================
# Activated via: SPRING_PROFILES_ACTIVE=prod
# ===================================================================

# ===================================================================
# DATABASE (Production-tuned HikariCP)
# ===================================================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.validation-timeout=3000

# ===================================================================
# JPA (Production settings)
# ===================================================================
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ===================================================================
# SERVER (Production hardening)
# ===================================================================
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=20
server.tomcat.accept-count=100

# ===================================================================
# LOGGING (Production - JSON via logback-spring.xml prod profile)
# ===================================================================
logging.level.root=INFO
logging.level.com.agenthub=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.springframework.web=WARN

# ===================================================================
# ACTUATOR (Production - restricted exposure)
# ===================================================================
management.endpoint.health.show-details=when-authorized

# ===================================================================
# THREADING (Production-tuned)
# ===================================================================
agenthub.orchestrator.threading.core-pool-size=10
agenthub.orchestrator.threading.max-pool-size=40
agenthub.orchestrator.threading.queue-capacity=200

# ===================================================================
# SPRINGDOC (Disabled in production)
# ===================================================================
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
